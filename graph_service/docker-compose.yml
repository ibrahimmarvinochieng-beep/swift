version: "3.8"

services:
  graph-service:
    build: .
    ports:
      - "8000:8000"
    environment:
      GRAPH_NEO4J_URI: bolt://neo4j:7687
      GRAPH_NEO4J_USER: neo4j
      GRAPH_NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      GRAPH_REDIS_URL: redis://redis:6379/0
      GRAPH_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - neo4j
      - redis

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

  kafka-consumer:
    build: .
    command: python -m consumers.kafka_graph_consumer
    environment:
      GRAPH_NEO4J_URI: bolt://neo4j:7687
      GRAPH_NEO4J_USER: neo4j
      GRAPH_NEO4J_PASSWORD: ${NEO4J_PASSWORD:-changeme}
      GRAPH_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - neo4j
      - kafka

volumes:
  neo4j_data: {}

version: "3.8"

services:
  # ── Swift API + Pipeline (all-in-one) ─────────────────────────────
  swift:
    build: .
    container_name: swift-platform
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      TLS_ENABLED: "true"
      TLS_CERT_FILE: /app/certs/swift-server.pem
      TLS_KEY_FILE: /app/certs/swift-server-key.pem
      TLS_CA_FILE: /app/certs/swift-ca.pem
      DB_SSLMODE: require
      REDIS_SSL: "true"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-swift_redis_secret}"
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  # ── PostgreSQL (TLS enabled) ────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: swift-db
    environment:
      POSTGRES_USER: swift_user
      POSTGRES_PASSWORD: change_me_in_production
      POSTGRES_DB: swift_db
    command:
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/var/lib/postgresql/certs/swift-server.pem"
      - "-c"
      - "ssl_key_file=/var/lib/postgresql/certs/swift-server-key.pem"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./certs/swift-server.pem:/var/lib/postgresql/certs/swift-server.pem:ro
      - ./certs/swift-server-key.pem:/var/lib/postgresql/certs/swift-server-key.pem:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swift_user -d swift_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Redis (password + TLS ready) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: swift-redis
    command:
      - "redis-server"
      - "--requirepass"
      - "${REDIS_PASSWORD:-swift_redis_secret}"
      - "--tls-port"
      - "6379"
      - "--port"
      - "0"
      - "--tls-cert-file"
      - "/tls/swift-server.pem"
      - "--tls-key-file"
      - "/tls/swift-server-key.pem"
      - "--tls-ca-cert-file"
      - "/tls/swift-ca.pem"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./certs:/tls:ro
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cert", "/tls/swift-server.pem",
             "--key", "/tls/swift-server-key.pem", "--cacert", "/tls/swift-ca.pem",
             "-a", "${REDIS_PASSWORD:-swift_redis_secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Kafka + Zookeeper (optional, SSL listeners for production) ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: swift-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    profiles: ["kafka"]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: swift-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: SSL://kafka:29092,SSL_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SSL:SSL,SSL_HOST:SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: SSL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/certs/swift-server-key.pem
      KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/certs/swift-ca.pem
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./certs:/etc/kafka/certs:ro
    profiles: ["kafka"]

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  kafka_data:
